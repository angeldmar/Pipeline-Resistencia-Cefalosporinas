# Ambiente para la regla download_sample (workflow/rules/download.smk).
#
# download_data.py invoca "fasterq-dump" via subprocess, y Snakemake solo
# activa UN ambiente conda por regla, asi que sra-tools debe vivir en el
# mismo ambiente que pandas (que usa download_data.py) en vez de en
# python.yaml -- eso mezclaria una herramienta externa con el ambiente
# "generico" de analisis, rompiendo el principio de un ambiente por
# herramienta que sigue el resto de este pipeline.
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python
  - pandas
  - sra-tools
